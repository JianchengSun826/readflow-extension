<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadFlow PDF</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fafaf9; color: #1c1917; }
    #header {
      position: sticky; top: 0; z-index: 10;
      background: #fff; border-bottom: 1px solid #e7e5e4;
      padding: 10px 24px; display: flex; align-items: center; gap: 8px;
    }
    #header span { font-size: 13px; font-weight: 600; color: #f59e0b; }
    #filename { font-size: 13px; color: #57534e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #content { max-width: 720px; margin: 0 auto; padding: 32px 24px 64px; }
    #status { text-align: center; padding: 48px 0; color: #a8a29e; font-size: 14px; }
    p.rf-para {
      margin-bottom: 1.2rem; line-height: 1.9; font-size: 16px;
      border-radius: 4px; padding: 3px 6px; cursor: default; transition: background 0.15s;
    }
    p.rf-para:hover { background: #f5f5f4; }
    p.rf-para.rf-active { background: #fef3c7; }
  </style>
</head>
<body>
  <div id="header">
    <span>ReadFlow</span>
    <span id="filename">PDF 加载中…</span>
  </div>
  <div id="content">
    <p id="status">正在解析 PDF，请稍候…</p>
  </div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
